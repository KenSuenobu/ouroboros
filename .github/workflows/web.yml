name: web

on:
  push:
    branches: [main]
    paths: ["apps/web/**", "package.json", "yarn.lock", ".github/workflows/web.yml"]
  pull_request:
    paths: ["apps/web/**", "package.json", "yarn.lock", ".github/workflows/web.yml"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack + yarn
        run: corepack enable

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install
        run: yarn install --immutable

      - name: Lint
        run: yarn workspace ouroboros-web lint

      - name: Unit tests
        run: yarn workspace ouroboros-web test --run

      - name: Build
        run: yarn workspace ouroboros-web build

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable corepack + yarn
        run: corepack enable

      - name: Cache yarn
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/install-state.gz
          key: yarn-${{ hashFiles('yarn.lock') }}
          restore-keys: yarn-

      - name: Install
        run: yarn install --immutable

      - name: Install Playwright browsers
        run: yarn workspace ouroboros-web exec playwright install --with-deps chromium

      - name: Run Playwright dry-run smoke
        env:
          OUROBOROS_E2E_MOCK: "1"
        run: yarn workspace ouroboros-web test:e2e --reporter=line
