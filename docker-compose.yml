services:
  api:
    build:
      context: ./apps/api
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      OUROBOROS_DB_URL: sqlite+aiosqlite:////app/data/ouroboros.sqlite
      OUROBOROS_DATA_DIR: /app/data
    depends_on:
      - ollama

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  ollama_data:
